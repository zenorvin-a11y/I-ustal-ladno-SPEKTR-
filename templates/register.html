<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Спектр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .logo img {
            height: 60px;
            width: 60px;
            border-radius: 50%;
        }
        
        .logo h1 {
            color: #667eea;
            margin-top: 0.5rem;
            font-size: 1.5rem;
        }
        
        h2 {
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.3rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .error-message {
            color: #f44336;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        
        button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .google-btn {
            background: white;
            border: 2px solid #ddd;
            color: #333;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .google-btn:hover {
            background: #f5f5f5;
            transform: none;
            box-shadow: none;
        }
        
        .separator {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .separator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }
        
        .separator span {
            background: white;
            padding: 0 0.5rem;
            position: relative;
            color: #999;
            font-size: 0.8rem;
        }
        
        .alert {
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .alert-error {
            background: #f44336;
            color: white;
        }
        
        .alert-success {
            background: #4caf50;
            color: white;
        }
        
        @media (max-width: 480px) {
            .register-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <img src="/static/logo.png" alt="Logo">
            <h1>СПЕКТР</h1>
        </div>
        
        <h2>Регистрация</h2>
        
        <div id="alertMessage" class="alert"></div>
        
        <form id="registerForm" method="POST" action="/register">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="name" id="name" placeholder="Введите имя" required>
                <div id="nameError" class="error-message"></div>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" id="email" placeholder="example@mail.com" required>
                <div id="emailError" class="error-message"></div>
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" id="password" placeholder="Минимум 4 символа" required>
                <div id="passwordError" class="error-message"></div>
            </div>
            
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" name="confirm_password" id="confirmPassword" placeholder="Повторите пароль" required>
                <div id="confirmError" class="error-message"></div>
            </div>
            
            <button type="submit" id="submitBtn">Зарегистрироваться</button>
        </form>
        
        <div class="separator">
            <span>или</span>
        </div>
        
        <a href="/login/google">
            <button type="button" class="google-btn">Войти через Google</button>
        </a>
        
        <div class="login-link">
            Уже есть аккаунт? <a href="/">Войти</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        
        function showAlert(message, isError = true) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        function hideError(elementId) {
            document.getElementById(elementId).textContent = '';
        }
        
        function showError(elementId, message) {
            document.getElementById(elementId).textContent = message;
        }
        
        function validateForm() {
            let isValid = true;
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            hideError('nameError');
            hideError('emailError');
            hideError('passwordError');
            hideError('confirmError');
            
            if (name.length === 0) {
                showError('nameError', 'Введите имя');
                isValid = false;
            } else if (name.length < 2) {
                showError('nameError', 'Имя должно быть не менее 2 символов');
                isValid = false;
            } else if (name.length > 50) {
                showError('nameError', 'Имя не должно превышать 50 символов');
                isValid = false;
            } else if (!/^[a-zA-Z0-9@._-]+$/.test(name)) {
                showError('nameError', 'Имя может содержать только буквы, цифры и @._-');
                isValid = false;
            }
            
            if (email.length === 0) {
                showError('emailError', 'Введите email');
                isValid = false;
            } else {
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('emailError', 'Введите корректный email');
                    isValid = false;
                }
            }
            
            if (password.length === 0) {
                showError('passwordError', 'Введите пароль');
                isValid = false;
            } else if (password.length < 4) {
                showError('passwordError', 'Пароль должен быть не менее 4 символов');
                isValid = false;
            }
            
            if (confirm.length === 0) {
                showError('confirmError', 'Подтвердите пароль');
                isValid = false;
            } else if (password !== confirm) {
                showError('confirmError', 'Пароли не совпадают');
                isValid = false;
            }
            
            return isValid;
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Регистрация...';
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showAlert('Регистрация успешна! Перенаправление...', false);
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1500);
                } else {
                    showAlert(result.error || 'Ошибка регистрации', true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Зарегистрироваться';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Ошибка сети. Проверьте подключение к интернету.', true);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Зарегистрироваться';
            }
        });
        
        document.getElementById('name').addEventListener('input', () => hideError('nameError'));
        document.getElementById('email').addEventListener('input', () => hideError('emailError'));
        document.getElementById('password').addEventListener('input', () => hideError('passwordError'));
        document.getElementById('confirmPassword').addEventListener('input', () => hideError('confirmError'));
    </script>
</body>
</html>
