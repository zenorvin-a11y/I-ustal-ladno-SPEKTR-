<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Спектр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .logo img {
            height: 60px;
            width: 60px;
            border-radius: 50%;
        }
        
        .logo h1 {
            color: #667eea;
            margin-top: 0.5rem;
            font-size: 1.5rem;
        }
        
        h2 {
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.3rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .error-message {
            color: #f44336;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        
        button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .google-btn {
            background: white;
            border: 2px solid #ddd;
            color: #333;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .google-btn:hover {
            background: #f5f5f5;
            transform: none;
            box-shadow: none;
        }
        
        .separator {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .separator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }
        
        .separator span {
            background: white;
            padding: 0 0.5rem;
            position: relative;
            color: #999;
            font-size: 0.8rem;
        }
        
        .success-message {
            background: #4caf50;
            color: white;
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .error-alert {
            background: #f44336;
            color: white;
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }
        
        @media (max-width: 480px) {
            .register-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <img src="/static/logo.png" alt="Logo">
            <h1>СПЕКТР</h1>
        </div>
        
        <h2>Регистрация</h2>
        
        <div class="error-alert" id="errorAlert"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="registerForm" onsubmit="return false;">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="name" placeholder="Введите имя" autocomplete="off">
                <div class="error-message" id="nameError"></div>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@mail.com" autocomplete="off">
                <div class="error-message" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Минимум 4 символа">
                <div class="error-message" id="passwordError"></div>
            </div>
            
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль">
                <div class="error-message" id="confirmError"></div>
            </div>
            
            <button type="button" id="submitBtn" onclick="register()">Зарегистрироваться</button>
        </form>
        
        <div class="separator">
            <span>или</span>
        </div>
        
        <a href="/login/google">
            <button type="button" class="google-btn">Войти через Google</button>
        </a>
        
        <div class="login-link">
            Уже есть аккаунт? <a href="/">Войти</a>
        </div>
    </div>

    <script>
        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function hideError(elementId) {
            const errorDiv = document.getElementById(elementId);
            errorDiv.style.display = 'none';
        }
        
        function showAlert(message, isError = true) {
            const alertDiv = isError ? document.getElementById('errorAlert') : document.getElementById('successMessage');
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        function validateForm() {
            let isValid = true;
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            hideError('nameError');
            hideError('emailError');
            hideError('passwordError');
            hideError('confirmError');
            
            if (name.length === 0) {
                showError('nameError', 'Введите имя');
                isValid = false;
            } else if (name.length < 2) {
                showError('nameError', 'Имя должно быть не менее 2 символов');
                isValid = false;
            } else if (name.length > 50) {
                showError('nameError', 'Имя не должно превышать 50 символов');
                isValid = false;
            } else if (!/^[a-zA-Z0-9@._-]+$/.test(name)) {
                showError('nameError', 'Имя может содержать только буквы, цифры и @._-');
                isValid = false;
            }
            
            if (email.length === 0) {
                showError('emailError', 'Введите email');
                isValid = false;
            } else {
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('emailError', 'Введите корректный email');
                    isValid = false;
                }
            }
            
            if (password.length === 0) {
                showError('passwordError', 'Введите пароль');
                isValid = false;
            } else if (password.length < 4) {
                showError('passwordError', 'Пароль должен быть не менее 4 символов');
                isValid = false;
            }
            
            if (confirm.length === 0) {
                showError('confirmError', 'Подтвердите пароль');
                isValid = false;
            } else if (password !== confirm) {
                showError('confirmError', 'Пароли не совпадают');
                isValid = false;
            }
            
            return isValid;
        }
        
        async function register() {
            if (!validateForm()) {
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Регистрация...';
            
            const data = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                confirm_password: document.getElementById('confirmPassword').value
            };
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showAlert('Регистрация успешна! Перенаправление...', false);
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1500);
                } else {
                    const errorMsg = result.error || 'Ошибка регистрации';
                    showAlert(errorMsg, true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Ошибка сети. Проверьте подключение к интернету.', true);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        }
        
        // Валидация в реальном времени
        document.getElementById('name').addEventListener('input', () => hideError('nameError'));
        document.getElementById('email').addEventListener('input', () => hideError('emailError'));
        document.getElementById('password').addEventListener('input', () => hideError('passwordError'));
        document.getElementById('confirmPassword').addEventListener('input', () => hideError('confirmError'));
        
        // Отправка по Enter
        const inputs = ['name', 'email', 'password', 'confirmPassword'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    register();
                }
            });
        });
    </script>
</body>
</html>
