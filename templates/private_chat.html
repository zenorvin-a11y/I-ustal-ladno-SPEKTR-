<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с {{ other_user.name }} - Спектр</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        :root {
            --bg: #0a0c10;
            --sidebar: #1a1e24;
            --text: #ffffff;
            --accent: #4CAF50;
            --message-bg: #2d2f36;
            --own-message: #4CAF50;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .navbar {
            background: var(--sidebar);
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .logo img {
            height: 32px;
            width: 32px;
            border-radius: 50%;
        }
        
        .logo span {
            font-size: 1rem;
            font-weight: bold;
            color: var(--accent);
        }
        
        .nav-links {
            display: flex;
            gap: 0.5rem;
        }
        
        .nav-links a {
            text-decoration: none;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }
        
        .chat-container {
            max-width: 800px;
            margin: 1rem auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--sidebar);
            border-radius: 12px;
            overflow: hidden;
            width: 95%;
        }
        
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(76, 175, 80, 0.3);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--sidebar);
        }
        
        .chat-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .chat-header h2 {
            color: var(--accent);
            font-size: 1.2rem;
        }
        
        .messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: var(--bg);
        }
        
        .message {
            max-width: 70%;
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            background: var(--message-bg);
            font-size: 0.9rem;
        }
        
        .message.sent {
            align-self: flex-end;
            background: var(--own-message);
        }
        
        .message.received {
            align-self: flex-start;
        }
        
        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.3rem;
            text-align: right;
        }
        
        .input-area {
            padding: 1rem;
            background: var(--sidebar);
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .input-area input {
            flex: 1;
            padding: 0.8rem;
            background: var(--bg);
            border: 1px solid var(--accent);
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
        }
        
        .input-area button {
            padding: 0.8rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .back-link {
            text-align: center;
            margin: 1rem;
        }
        
        .back-link a {
            color: var(--accent);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png" alt="Logo">
                <span>СПЕКТР</span>
            </div>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/messages">Сообщения</a>
                <a href="/groups">Группы</a>
                <a href="/channels">Каналы</a>
                <a href="/profile">Профиль</a>
                <a href="/vyhod">Выход</a>
            </div>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <img src="{{ other_user.avatar }}" onerror="this.src='/static/logo.png'">
            <h2>{{ other_user.name }}</h2>
        </div>
        
        <div class="messages" id="messages">
            {% for msg in messages %}
            <div class="message {% if msg.sender_id == user.id %}sent{% else %}received{% endif %}">
                <div>{{ msg.content }}</div>
                <div class="message-time">{{ msg.timestamp.strftime('%H:%M') }}</div>
            </div>
            {% endfor %}
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
    
    <div class="back-link">
        <a href="/messages">← Назад к чатам</a>
    </div>

    <script>
        const socket = io();
        const userId = {{ user.id }};
        const otherUserId = {{ other_user.id }};
        const roomId = `private_${Math.min(userId, otherUserId)}_${Math.max(userId, otherUserId)}`;
        
        socket.on('connect', function() {
            socket.emit('join_private_chat', {user1: userId, user2: otherUserId});
        });
        
        socket.on('new_private_message', function(data) {
            if ((data.sender_id === userId && data.receiver_id === otherUserId) ||
                (data.sender_id === otherUserId && data.receiver_id === userId)) {
                
                const messagesDiv = document.getElementById('messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message ' + (data.sender_id === userId ? 'sent' : 'received');
                messageDiv.innerHTML = `
                    <div>${escapeHtml(data.content)}</div>
                    <div class="message-time">${data.timestamp}</div>
                `;
                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        });
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            socket.emit('send_private_message', {
                sender_id: userId,
                receiver_id: otherUserId,
                content: content
            });
            
            input.value = '';
        }
        
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        const messagesDiv = document.getElementById('messages');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    </script>
</body>
</html>
